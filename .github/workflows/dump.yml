name: Dump psxspu.h

on:
  workflow_dispatch:

jobs:
  dump:
    runs-on: ubuntu-latest
    steps:
      - name: Download latest PSn00bSDK release (official, open source)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p "$HOME/psn00bsdk" /tmp/psn00b-dl
          cd /tmp/psn00b-dl
          gh release download --repo Lameguy64/PSn00bSDK --pattern "*" --clobber
          for f in *.zip; do
            [ -f "$f" ] || continue
            unzip -q -o "$f" -d "$HOME/psn00bsdk"
          done
          for f in *.tar.gz *.tgz *.tar.xz; do
            [ -f "$f" ] || continue
            tar -xf "$f" -C "$HOME/psn00bsdk"
          done

      - name: Show what actually got extracted
        run: |
          echo "== Top-level extracted tree =="
          find "$HOME/psn00bsdk" -maxdepth 4
          echo ""
          echo "== Any header with 'spu' in the name =="
          find "$HOME/psn00bsdk" -iname "*spu*.h"

      - name: Dump the real psxspu.h
        run: |
          mkdir -p /tmp/out
          find "$HOME/psn00bsdk" -iname "psxspu.h" -exec cp {} /tmp/out/psxspu.h \;
          ls -la /tmp/out

      - uses: actions/upload-artifact@v4
        with:
          name: psxspu-header
          path: /tmp/out
          if-no-files-found: error
