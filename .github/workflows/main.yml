name: Build EXE

on:
  push:
    branches: [ main ]
    paths:
      - "Source Code/**"
  pull_request:
    paths:
      - "Source Code/**"
  workflow_dispatch:

jobs:
  build:
    # PsyQ (ccpsx / cpe2x) is a 16-bit/32-bit Windows toolchain, so this
    # needs a Windows runner.
    runs-on: windows-latest

    # ---------------------------------------------------------------------
    # PsyQ itself is Sony/SN Systems proprietary SDK -- GitHub-hosted
    # runners don't have it, and it can't be downloaded from a public URL
    # here. Pick ONE of these before this workflow will actually work:
    #
    #   A) Check the toolchain into this repo (e.g. under `toolchain/PSYQ/`,
    #      alongside mkpsxiso) if your license permits it, and point
    #      PSYQ_DIR at that path.
    #
    #   B) Restore it from a private location you control (actions/cache,
    #      a private release asset, an internal artifact server, etc.) in
    #      an extra step before "Build main.exe" below, using a repo/org
    #      secret for the URL or credentials -- do not hardcode a download
    #      URL for the SDK itself here.
    #
    #   C) Use a self-hosted Windows runner that already has PsyQ installed,
    #      and change `runs-on` above to your runner's label.
    # ---------------------------------------------------------------------
    env:
      PSYQ_DIR: ${{ github.workspace }}\toolchain\PSYQ

    defaults:
      run:
        working-directory: Source Code
        shell: cmd

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      # Uncomment and adapt if you're restoring the toolchain via cache
      # instead of checking it into the repo (see option B above).
      # - name: Restore PsyQ toolchain
      #   uses: actions/cache@v4
      #   with:
      #     path: toolchain/PSYQ
      #     key: psyq-toolchain

      - name: Add PsyQ tools to PATH
        run: echo %PSYQ_DIR%>>%GITHUB_PATH%

      - name: Clean previous build artifacts
        run: |
          if exist mem.map del mem.map
          if exist main.sym del main.sym
          if exist main.exe del main.exe
          if exist main.cpe del main.cpe

      - name: Build main.exe
        run: |
          ccpsx -Xo0x80010000 -Wall -O2 main.c -o main.cpe
          cpe2x /ca main.cpe

      - name: Upload main.exe artifact
        uses: actions/upload-artifact@v4
        with:
          name: main-exe
          path: Source Code/main.exe
          if-no-files-found: error
