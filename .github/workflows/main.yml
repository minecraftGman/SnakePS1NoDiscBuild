name: Build (PSn00bSDK, no CD)

on:
  push:
    branches: [ main ]
    paths:
      - "psn00b_port/**"
  pull_request:
    paths:
      - "psn00b_port/**"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: psn00b_port

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build

      - name: Download latest PSn00bSDK release (official, open source)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p "$HOME/psn00bsdk" /tmp/psn00b-dl
          cd /tmp/psn00b-dl

          echo "== Assets in the latest PSn00bSDK release =="
          gh api repos/Lameguy64/PSn00bSDK/releases/latest --jq '.assets[].name'

          # Download everything from the release rather than guessing a
          # filename pattern -- it's a small handful of files, and this
          # keeps the workflow working even if asset names change.
          gh release download --repo Lameguy64/PSn00bSDK --clobber --pattern "*"

          ls -la .

          for f in *.zip; do
            [ -f "$f" ] || continue
            echo "Extracting $f"
            unzip -qo "$f" -d "$HOME/psn00bsdk"
          done
          for f in *.tar.gz *.tgz *.tar.xz; do
            [ -f "$f" ] || continue
            echo "Extracting $f"
            tar -xf "$f" -C "$HOME/psn00bsdk"
          done

          echo "== Extracted tree =="
          find "$HOME/psn00bsdk" -maxdepth 4

      - name: Set up PATH and PSN00BSDK_LIBS
        run: |
          echo "== bin/ directories found =="
          find "$HOME/psn00bsdk" -maxdepth 4 -type d -name bin -print

          # Add every bin/ dir we found -- the GCC toolchain and the SDK's
          # own tools (elf2x, mkpsxiso, ...) ship as separate archives with
          # their own bin/ folders, and both need to be on PATH.
          find "$HOME/psn00bsdk" -maxdepth 4 -type d -name bin | while read -r d; do
            echo "$d" >> "$GITHUB_PATH"
          done

          LIBS_DIR="$(find "$HOME/psn00bsdk" -maxdepth 5 -type d -path '*/lib/libpsn00b' | head -1)"
          echo "Resolved LIBS_DIR=$LIBS_DIR"
          if [ -z "$LIBS_DIR" ]; then
            echo "::error::Could not find lib/libpsn00b under $HOME/psn00bsdk -- see the 'Extracted tree' log above and adjust the find pattern."
            exit 1
          fi
          echo "PSN00BSDK_LIBS=$LIBS_DIR" >> "$GITHUB_ENV"

      - name: Configure
        run: cmake --preset default .

      - name: Build
        run: cmake --build ./build

      - name: Find and upload the built executable
        run: |
          mkdir -p /tmp/out
          find build -maxdepth 2 -iname "*.exe" -exec cp {} /tmp/out/ \;
          ls -la /tmp/out

      - uses: actions/upload-artifact@v4
        with:
          name: snake-psn00bsdk
          path: /tmp/out
          if-no-files-found: error
